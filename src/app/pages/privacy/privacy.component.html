<sh-app-header-container />
<main class="shell py-12 lg:py-16">
  <article class="mx-auto max-w-2xl">
    <p class="eyebrow">Juridisk</p>
    <h1 class="mt-2 text-display-xl text-ink-900">{{ title }}</h1>
    <p class="mt-4 rounded-lg border border-amber-200 bg-amber-50 px-4 py-3 text-sm text-amber-950">
      {{ notice }}
    </p>

    @for (section of sections; track section.heading) {
      <section class="mt-10">
        <h2 class="text-h2 text-ink-900">{{ section.heading }}</h2>
        @for (paragraph of section.paragraphs; track paragraph) {
          <p class="mt-3 text-body text-ink-700">{{ paragraph }}</p>
        }
      </section>
    }

    <p class="mt-12">
      <a routerLink="/" class="font-semibold text-brand hover:underline">Tilbage til forsiden</a>
    </p>
  </article>
</main>
