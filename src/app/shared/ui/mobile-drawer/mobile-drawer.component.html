<div
  class="fixed inset-0 z-[var(--z-overlay)] hidden bg-[var(--overlay)] opacity-0 pointer-events-none lg:hidden"
  [class.hidden]="!open()"
  [class.opacity-0]="!open()"
  [class.pointer-events-none]="!open()"
  [class.transition-opacity]="animate()"
  [class.duration-300]="animate()"
  (click)="closeDrawer.emit()"
></div>

<aside
  id="drawer"
  class="fixed right-0 top-0 z-[var(--z-drawer)] flex h-full w-72 max-w-[80%] translate-x-full flex-col bg-surface shadow-drawer lg:hidden"
  [class.translate-x-0]="open()"
  [class.translate-x-full]="!open()"
  [class.transition-transform]="animate()"
  [class.duration-300]="animate()"
  [class.ease-decelerate]="animate()"
  [attr.aria-hidden]="!open()"
>
  <div class="flex items-center justify-between px-5 py-4">
    <span class="text-lg font-extrabold text-ink-900">S<span class="text-brand">&amp;</span>H</span>
    <button
      type="button"
      class="inline-flex size-11 items-center justify-center rounded-md text-ink-900 hover:bg-[var(--hover-overlay)]"
      aria-label="Luk menu"
      (click)="closeDrawer.emit()"
    >
      <fa-icon icon="xmark" class="size-6" />
    </button>
  </div>
  <nav class="flex flex-1 flex-col px-2">
    @for (link of navLinks(); track link.label) {
      <a
        [href]="link.href"
        class="drawer-link"
        [class.!font-semibold]="link.active"
        [class.!text-brand]="link.active"
        (click)="navLinkClick.emit({ link, event: $event })"
      >
        {{ link.label }}
      </a>
    }
  </nav>
  <div class="p-4">
    <a [href]="phoneHref()" class="btn btn-primary">{{ phoneLabel() }}</a>
  </div>
</aside>
