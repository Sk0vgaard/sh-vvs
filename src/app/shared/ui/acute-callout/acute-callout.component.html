<aside class="rounded-lg border border-amber-300 bg-amber-50 px-4 py-4 text-amber-950" role="note">
  <div class="flex gap-3">
    <fa-icon icon="phone" class="mt-0.5 size-5 shrink-0" />
    <div>
      <p class="font-semibold">{{ title() }}</p>
      <a [href]="phoneHref()" class="mt-2 inline-flex font-semibold text-brand hover:underline">{{ phoneLabel() }}</a>
    </div>
  </div>
</aside>
