<article class="card text-center" [class.p-4]="compact()" [class.p-6]="!compact()">
  <div class="mx-auto flex flex-col items-center text-brand">
    <ng-content select="[serviceCardIcon]"></ng-content>
  </div>
  <h3 class="text-h3 text-ink-900" [class.mt-3]="compact()" [class.mt-4]="!compact()" [class.min-h-12]="!compact()">
    {{ title() }}
  </h3>
  <p class="mt-2 text-body text-ink-500" [class.flex-1]="!compact()">{{ description() }}</p>
  @if (!compact()) {
    <a [href]="href()" class="btn-link mt-4 justify-center">
      Læs mere
      <fa-icon icon="arrow-right" class="size-4" />
    </a>
  }
</article>
