@if (visible()) {
  <div class="fixed inset-0 z-[var(--z-modal)] flex items-center justify-center p-4">
    <button
      type="button"
      class="fixed inset-0 bg-[var(--overlay)]"
      aria-label="Luk meddelelse"
      (click)="dismissDialog()"
    ></button>

    <div
      role="dialog"
      aria-modal="true"
      aria-labelledby="dev-notice-title"
      class="relative z-10 w-full max-w-md rounded-lg border border-border bg-surface p-6 shadow-popover"
    >
      <p class="eyebrow">Bemærk</p>
      <h2 id="dev-notice-title" class="mt-2 text-h3 text-ink-900">Hjemmesiden er under udvikling</h2>
      <p class="mt-3 text-body text-ink-500">
        Vi arbejder stadig på indhold og funktioner. Du kan opleve ændringer, og ikke alt er færdigt endnu.
      </p>
      <label class="mt-5 flex cursor-pointer items-center gap-2.5 text-body text-ink-700">
        <input
          type="checkbox"
          class="size-4 shrink-0 rounded-sm border-field-border text-brand focus-visible:outline-2 focus-visible:outline-offset-1 outline-focus-ring"
          [checked]="dontShowAgain()"
          (change)="onDontShowAgainChange($event)"
        />
        Vis ikke igen
      </label>
      <button type="button" class="btn btn-primary mt-5 w-full sm:w-auto" (click)="dismissDialog()">Forstået</button>
    </div>
  </div>
}
