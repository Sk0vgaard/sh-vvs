<footer [id]="SectionId.Contact" class="bg-navy-900 text-on-dark">
  <div class="shell grid gap-6 py-9 md:grid-cols-3 md:divide-x md:divide-white/10">
    <div class="flex items-center gap-4 md:justify-center">
      <span class="inline-flex size-11 items-center justify-center rounded-full bg-brand">
        <svg
          class="size-5"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.75"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path
            d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.69 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.33 1.85.56 2.81.69A2 2 0 0 1 22 16.92Z"
          />
        </svg>
      </span>
      <span>
        <span class="block text-sm text-navy-muted">Ring til os</span>
        <a [href]="phoneHref()" class="block font-semibold">{{ phoneLabel() }}</a>
      </span>
    </div>
    <div class="flex items-center gap-4 md:justify-center">
      <span class="inline-flex size-11 items-center justify-center rounded-full bg-brand">
        <svg
          class="size-5"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.75"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <rect x="2" y="4" width="20" height="16" rx="2" />
          <path d="m2 7 10 6 10-6" />
        </svg>
      </span>
      <span>
        <span class="block text-sm text-navy-muted">Send en mail</span>
        <a [href]="emailHref()" class="block font-semibold">{{ emailLabel() }}</a>
      </span>
    </div>
    <div class="flex items-center gap-4 md:justify-center">
      <span class="inline-flex size-11 items-center justify-center rounded-full bg-brand">
        <svg
          class="size-5"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.75"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M21 10c0 6-9 12-9 12s-9-6-9-12a9 9 0 0 1 18 0Z" />
          <circle cx="12" cy="10" r="3" />
        </svg>
      </span>
      <span>
        <span class="block text-sm text-navy-muted">Vores område</span>
        <span class="block font-semibold">Vi dækker hele Sjælland</span>
      </span>
    </div>
  </div>
</footer>
