<footer class="bg-navy-900 text-on-dark">
  <div class="shell grid gap-6 py-9 md:grid-cols-3 md:divide-x md:divide-white/10">
    <div class="flex items-center gap-4 md:justify-center">
      <span class="icon-badge">
        <fa-icon icon="phone" class="size-5" />
      </span>
      <span>
        <span class="block text-sm text-navy-muted">Ring til os</span>
        <a [href]="phoneHref()" class="block font-semibold">{{ phoneLabel() }}</a>
      </span>
    </div>
    <div class="flex items-center gap-4 md:justify-center">
      <span class="icon-badge">
        <fa-icon icon="envelope" class="size-5" />
      </span>
      <span>
        <span class="block text-sm text-navy-muted">Send en mail</span>
        <a [href]="emailHref()" class="block font-semibold">{{ emailLabel() }}</a>
      </span>
    </div>
    <div class="flex items-center gap-4 md:justify-center">
      <span class="icon-badge">
        <fa-icon icon="location-dot" class="size-5" />
      </span>
      <span>
        <span class="block text-sm text-navy-muted">Område</span>
        <span class="block font-semibold">{{ serviceArea() }}</span>
      </span>
    </div>
  </div>
  <div class="shell border-t border-white/10 py-6 text-center text-sm text-navy-muted">
    <p>{{ legalName() }} · CVR {{ cvr() }}</p>
    <p class="mt-1">{{ streetAddress() }}</p>
    <p class="mt-3 flex flex-wrap items-center justify-center gap-x-3 gap-y-1">
      <a routerLink="/privatliv" class="hover:text-on-dark">Privatlivspolitik</a>
      <span aria-hidden="true">·</span>
      <button type="button" class="hover:text-on-dark" (click)="openCookieSettings()">Cookie-indstillinger</button>
    </p>
  </div>
</footer>
